<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — CommuteWise</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      body { display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 1.5rem; background: #fafafa; color: #111; }
      @media (prefers-color-scheme: dark) { body { background: #0a0a0a; color: #fafafa; } }
      .card { max-width: 420px; text-align: center; }
      h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0 0 1.25rem; line-height: 1.5; opacity: 0.8; }
      button { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid currentColor; background: transparent; color: inherit; font: inherit; cursor: pointer; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>CommuteWise needs an internet connection to fetch routes and weather. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
